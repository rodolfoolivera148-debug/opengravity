# Reversa — Configuração do Projeto
# Este arquivo é gerenciado pelo instalador. Para customizações, edite config.user.toml

[project]
name = "Opengravity"
version = "1.0.0"

[user]
name = "Rodolfo"
chat_language = "es"
doc_language = "español"

[output]
folder = "_reversa_sdd"

[agents]
installed = [
  "reversa",
  "reversa-scout",
  "reversa-archaeologist",
  "reversa-detective",
  "reversa-architect",
  "reversa-writer",
  "reversa-reviewer",
  "reversa-visor",
  "reversa-data-master",
  "reversa-design-system",
  "reversa-agents-help",
  "reversa-reconstructor"
]

[engines]
installed = [
  "gemini-cli",
  "antigravity",
  "opencode"
]

[analysis]
answer_mode = "chat"
doc_level = "completo"
